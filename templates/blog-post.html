<article class="blog-shell blog-article">
  <header class="blog-article-header">
  <p class="blog-eyebrow">
    <a href="/blog/" class="blog-back-link">← Back to blog</a>
  </p>
    {{TITLE_ROW}}
    <p class="blog-article-description">{{DESCRIPTION}}</p>
    <div class="blog-article-meta">
      <time class="blog-date" datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
      {{TAGS}}
    </div>
  </header>
  <div class="blog-prose">
    {{CONTENT}}
  </div>
  <footer class="blog-article-footer">
    <a href="/blog/" class="blog-back-link">← Back to blog</a>
  </footer>
</article>
